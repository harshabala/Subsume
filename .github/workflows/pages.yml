# Deploy docs/privacy.html to GitHub Pages as /privacy.html
# Repo Settings → Pages → Source: GitHub Actions

name: Deploy privacy policy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/privacy.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage privacy.html for Pages root
        run: |
          mkdir -p _site
          cp docs/privacy.html _site/privacy.html
          # Minimal index so the Pages root is not empty
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=privacy.html" />
            <title>Subsume</title>
            <link rel="canonical" href="privacy.html" />
          </head>
          <body>
            <p><a href="privacy.html">Subsume Privacy Policy</a></p>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
